body:
  text: 於丙與丑甲爲一貫次輪旣移則最遠最近不能與丑甲貫以舊次輪之心爲最近自此起算用丙卽不啻用丑也若次均輪之心不與次輪之最遠合則次輪平行之徑不可以爲邊亦先併所知之角得外角又半行度之所餘而加減之以爲角卽用通弦以爲邊通弦者兩正弦相合也截行度爲弧背有弧背必有通弦有通弦必有界角界角之度倍於角度新次輪之界角爲舊次輪之角葢兩輪相貫在此爲通弦在彼爲半徑故以行度之所餘半之以加減外角也
  hash: sha256:efcfba02e2736e1048cdf583bd88cae7da5901dba7b96092761cfe400828113a
