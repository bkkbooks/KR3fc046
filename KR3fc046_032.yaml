body:
  text: 又按日在本天之最卑止見火星本天之高卑爲本天高卑之差若日在最高則高差更加本天之高卑不可見故測本天之高卑必當火在最高日在最卑也本輪之遠近視乎本天之心差起於本天也均輪之遠近視乎本輪之心消息乎本輪也太陰次輪之遠近視本輪不視均輪者舊次輪之心次均之所起也五星次輪不以本輪之心爲遠近而視乎本天之心者次均起於合伏合伏與次輪本天兩心相貫也伏見輪不用最遠最近而用平遠平近者星行伏見度不行距日度平遠距最遠爲初均加減地也本輪之心右旋均輪之心左旋成其差也次輪之度左旋伏見輪之度右旋合其跡也星包於日則次輪右伏見輪左日包於星則次輪左伏見輪右判於距日之疾徐也次均輪之上下視本天之心不視次輪者三均起於次均輪心必與次均之界相切也日星之體皆右旋太陰之體左旋者間於次均輪而與之消息也星行距日度太陰行距日倍度者其消息次輪之度猶日之於均輪也金星伏見輪心自最近倍行水星伏見輪心自最遠三倍行者所以就實測之度也
