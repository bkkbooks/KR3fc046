body:
  text: 按丙未均輪半徑未乙負輪半徑丁子甲初均數有初均求得之甲角有乙甲本天半徑有丙未乙均輪本輪兩半徑用兩邊一角以求角乃得丙角諸輪之徑或長或縮由實測而得之諸輪之行或左或右或一倍或三倍由弧角之求而得之不如是為徑不合於測不如是行不便於求或以七政之行真有諸輪則鑿矣本天半徑七政皆一千萬本輪半徑日二十六萬八千八百一十二月五十八萬土八十六萬五千五百八十七木七十萬五千三百二十火一百四十八萬四千金二十三萬一千九百六十二水五十六萬七千五百二十三均輪半徑日八萬九千六百四月二十九
