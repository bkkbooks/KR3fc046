body:
  text: 按水星三倍引數初均當壬故以壬卯邊均輪半徑卯乙邊本輪半徑卯角求得壬乙邊合乙甲邊本天半徑乙角又求得甲角按辛卯爲均輪距本輪最近度若初均在壬則乙角爲子辛於卯辛減乙角子卯初均在癸則乙角爲丁辛於卯辛加乙角丁卯故求壬卯乙之壬乙邊必隨求乙角卯子或丁卯以爲加減地也更以次輪之行度爲之角以半徑爲之邊其一邊自初均而得之於是有兩邊一角求得角而加減之是爲次
