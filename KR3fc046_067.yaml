body:
  text: 按圖甲乙丙三角形併甲於乙可得丙外角卽丁己甲之丁法與前同若不併甲乙二角竟用丙角之外角加減己戊界角之半卽得丁戊甲之丁角然丙角須待求而後得數也所以用對角之度以得外角者甲乙丙三角在最卑左右均輪行度卽乙角之度故以併初均求得之甲角卽得外角甲乙丙三角在最高左右均輪行度在九十度之內則爲乙角之外角在二百七十一度以上則必減去半周乃爲乙角參差不一不如竟求丙角以得其外角也按丙午丁之丙角爲乙丙甲之丙外角午丙與己丁兩線平行則午丙甲同於己丁甲戊在己後則減己戊戊在己前則加己戊戊在丙前則加己戊而用餘弧戊未爲丁角
