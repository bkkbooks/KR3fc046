  text: 萬土二十九萬六千四百一十三木二十四萬七千九百八十火三十七萬一千金八萬八千八百五十二水十一萬四千六百三十二負輪半徑月七十九萬七千日五星無次輪半徑日無月二十一萬七千土一百四萬二千六百木一百九十二萬九千四百八十火最小六百三十萬二千七百五十金水不用次均輪半徑月一十一萬七千五百日五星無伏見輪半徑金七百二十二萬四千八百五十水三百八十五萬日無月土木火不用右半徑表日本輪心自本天最高右旋均輪心自本輪最遠左旋太陽自均輪最近倍均輪心右旋月本輪心自本天最高右旋均輪心自本輪最遠左旋次輪心自均輪最近倍均輪心右旋次均輪自次輪負輪周所載最近倍距日度右旋太陰自次均輪最下倍距日度左旋土木火本輪心自本天最高右旋均輪心自本輪最遠左旋次輪心自均輪最近右旋星自次輪
