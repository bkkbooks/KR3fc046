body:
  text: 欲置次輪於均輪之周乃以新本輪半徑加次輪半徑規之而為負輪以均輪次輪之較為負輪舊本輪之較所以載均輪而就次輪也按次輪之周原與本輪之周相切其度未可移易今欲載次輪於均輪惟使均輪就次輪使均輪就次輪不得不增損新舊兩本輪以就均輪蓋均輪在新本輪之周其周與次輪之周相切將伸均輪之周以就次輪之心則必伸出一次輪半徑乃可故以次輪半徑加新本輪半徑為負輪半徑以載均輪然次輪之心雖載於均輪之周以圖核之仍與舊本輪之周兩周相切也均輪在負輪與在本輪相去一次輪之半徑次輪在負輪之均輪與在本輪之均輪亦相去一半徑初均消息
