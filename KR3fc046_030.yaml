body:
  text: 按弟谷曰日之攝五星若磁石之引鐵故其距日有定距今考火星在最卑遠點太陽在最卑與火星在最高之近點太陽在最卑其相距之度皆等惟火星在最高太陽亦在最高則既加太陽高卑之差復加本天高卑之差而星之距日遂過乎常此定距之説未可槩也梅勿𤲅徵君火星本法云火星兼論太陽之高卑要不能改其徑線之大致今以求法考之以均輪所當之矢為兩差之比例以相加則其徑線隨本輪矢之高下為高下有不能不改其大致者矣江愼修布衣云他星繞日繞其本輪心爾火日同類獨以太陽實體為心故次輪大小兼論太陽之高卑乃細度之恐亦未然高卑之差惟有不同心之異其輪則同大今推求火星次輪之法在最卑時其半徑為最小稍離乎最卑之左右增損一分一秒則本輪之矢隨之而長即半徑之度隨之而增規此成圖必大於本圈非不同心圈與伏見輪之狀可比或者火星之次輪本割入太陽天內高卑之差緣是以起然又無從得其貫通總之設諸輪以合實測其所以然之故終非可以臆度謂火星次輪之大小由於太陽實體其理恐未可通也
