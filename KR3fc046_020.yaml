body:
  text: 本天用本輪之次輪次均求合倍離用負輪之次輪次輪之地易而相承以心故與均輪之徑平行也按梅勿𤲅徵君云天西行七政之本輪皆從天而西轉其行皆向最高日天東移月五星之合望次輪皆從日而東運其行皆向日又云本天挈小輪心東移而七政在小輪上常向最高殆其精氣有以攝之循嘗細推其理因兩心差而立最高之名由最高規爲不同心圈其跡緣最高而周設爲本輪易右行爲左行在右行爲緣最高而下在左行則爲常向最高以爲常向最高可以爲順最高右行亦可不必眞有小輪而本天挈其心也月五星依日而測故因朔望兩弦設爲次輪又設爲次均輪以其自朔望而測自以
