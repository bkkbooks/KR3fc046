body:
  text: 自午歴丑歴丁至壬則壬子午爲餘弧卽弧背午寅壬卽通弦於丁壬子午半周內減去壬子午餘丁壬爲午界角其度四十五若在新輪正當寅卯爲四十五度之半二十二度三十分故界角折半而得角也若以丁午全徑爲半徑規爲甲丙乙丁之大周其午角己丁亦四十五度之半視午界角之丁壬亦折半也壬與己一線若無平行之線則初均之角必爲句股兩角併亦得外角又半行度之所餘而加減之以爲角兩角一爲正角矩之界以弦弦外之朒角與兩角之朒角等規之界以弦弦外之盈角與正角朒角相併等
