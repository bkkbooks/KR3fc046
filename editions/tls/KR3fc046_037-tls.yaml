body:
  text: 江都焦循學以差而有徑以徑而有輪輪之周統大小廣狹而其度皆等故其角也等其心卽等其度有角有弧而弧三角之法可立矣規線作圜分其周之度爲三百六十作線徑交午圜中以交處爲心爲距等圈於周內距等之義詳見釋弧隨其大小爲度之廣狹而皆同此心卽皆同此三百六十度故無論本輪均輪次輪得地心之角度卽得本天之行度也弧三角之法由弧以知弦諸輪之法由輪以知徑徑卽弦也輪因徑而設徑隨輪之大小爲長短本天半徑一千萬此常爲半徑而不移者小於一千萬則弦也餘弦也以諸輪之半徑相加因而長於一千萬則大切也大割也故半徑之名雖同而所用實異用輪爲角大小必齊用角爲弦長短互異弦之數生於半徑者也半徑不同則角亦異矣本天半徑一率角度正弦二率諸輪半徑三率求得四率爲諸輪正弦倍之卽通弦餘線亦然
