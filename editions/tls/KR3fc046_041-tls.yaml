body:
  text: 推算之法諸輪心一線者無加減若最高最卑當中距則有本天半徑有本輪均輪兩半徑有本輪心直角是兩邊一角也求得本天之角卽均數若當高卑中距之間則本輪均輪之半徑不可以相加本輪之心不可以爲角本天之半徑不可以爲邊則先以均輪心之行度爲角以均輪半徑減本輪半徑爲邊參以直角有一邊兩角以求未知之兩邊又以所得之一邊合本天之半徑以一邊合均輪行度之通弦參以直角有一角兩邊以求角以所得之角因盈縮而加減焉自均輪最近抵本輪半徑必成句股之形其通弦必與句相貫爲大句右行一左行二其端必齊此引數所以用倍也
