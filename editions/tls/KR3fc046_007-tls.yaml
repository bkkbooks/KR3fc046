body:
  text: 江都焦循學循旣述釋弧三篇所以明步天之用也然弧線之生緣於諸輪輪徑相交乃成三角之𧰼輪之弗明法無從附也擬爲釋輪二篇上篇言諸輪之異同下篇言弧角之𠮓化以明立法之意由於實測若高卑遲疾之故則未敢以臆度焉嘉慶元年春二月記時寓寧波校士館中七政諸輪生於實測中地心而規之則有本天分之以四各得九十度自高卑至於中距皆等焉由是自卑測之至於中距實行過之爲積盈自高測之至於中距實行不及爲積縮盈縮之差其正切爲兩心差以兩心差爲半徑規之是爲本輪本輪者爲中距之
  hash: sha256:4e5ad721546af31920e2a9f4f849fef408711d1b36a40edb8f6f7e36e201a744
