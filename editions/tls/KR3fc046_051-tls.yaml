body:
  text: 均凡行度過半周則用其度之餘按乙丑爲甲角復以甲角丙角丙甲邊或丙子弧求得子甲角爲次均之一邊以次輪半徑子辰爲一邊行度辰未餘弧卽子角有子角有子辰邊有子甲邊可求甲角丑亥於平行加乙丑外又加丑亥爲次均數也自未至酉爲半周歴酉至辰則過半周行度爲未酉辰餘弧爲辰未故用辰未也又按酉子丑未爲一線丑以前爲初均得數次均自丑起卽自酉起次輪視本天爲遠近於此益明月之次均知兩邊而行度不可以爲用以初均所知之二角併之以爲角兩角之線相交其外角卽兩角併之
