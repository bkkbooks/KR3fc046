body:
  text: 穆尼閣新西法用不同心天蔣友仁所説地動儀設太陽不動而地球如七曜之流轉此皆言其當然而又設言其所以然然其當然者悉憑實測其所以然者止就一家之説衍而極之以明算理而巳是故月五星初均次均之加减其故由于有本輪次輪而其實月五星之所以有本輪次輪其故仍由于實測之時當有加减也以是推之則月體一周不能成大圈與本天等其故由于有次輪面所以有次輪之故則由于朔望以外當有加减也火星軌迹不能等于本天其故由于歲輪徑有大小而所以輪徑有大小之故則由于以無消長之輪徑算火星猶有不合而更宜有加减也若不此之求而或于諸曜之性情冷熱別究其交關之故則轉屬支離矣狂瞽之見以質高明是否有當統祈裁正李銳再拜
  hash: sha256:7dd120d69cd71c0d609362231e98580b6ef89fcd03f5c8a877762b4ea18b3501
