body:
  text: 按舊止用本輪以與實測不合故用均輪以消息之弟谷設於地心其推步亦等可知諸輪皆以實測而設之非天之眞有諸輪也不然同一本輪何以或大或小同一均輪何以或設於地心或設於本輪也測月於兩弦實體與均輪心差乃設次輪以齊之測月於兩弦朔望之間實體與次輪心差乃設次均輪以齊之本輪爲中距設不爲高卑設必與高卑之線合均輪爲高卑中距之間設不爲中距設必與中距之線合次輪爲兩弦設不爲朔望設必與朔望之線合次均輪爲兩弦朔望之間設不爲兩弦設必與兩弦之線合必與
