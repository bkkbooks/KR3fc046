body:
  text: 按均輪通弦與最卑抵徑之線相貫爲大句其所以必貫爲大句之理前圖明之猶恐未能了然故更爲是圖上圈本輪下圈均輪甲爲本輪心卽爲均輪之最近午爲均輪心十二辰爲最高甲乙丙下庚壬爲實體所行如以丑爲最高則丑未爲本輪徑線辰甲爲通弦起於最近甲卽抵於本輪之徑甲也推之寅卯以下皆然在本輪爲辰已已午未申放此在均輪爲辰庚庚丁丙甲放此爲界角之與半徑故本輪一均輪二必相遇也又按子丁爲均輪通弦用與丙丁線相加必用三率比例由半徑求得通弦眞數如三十度之正弦五百萬爲六十度之通弦一千萬與本天半徑等以此與丙丁相加必不入矣唯以一千萬與太陽均輪半徑八萬九千六百零四相比例則六十度之通弦仍得八萬九千六百零四也丁丙出於丁乙丁乙爲兩半徑相減則亦出於半徑者也丁丙與丁乙皆出於均輪半徑合爲一邊故無戾耳若引數不可以用倍則不能以用大句乃以本輪均輪兩半徑爲兩邊行度爲角求得對邊及本輪心角以對邊與本天半徑爲兩邊以本輪心角加減均輪心距本輪最近之度以爲角有兩邊一角而初均亦可求也
