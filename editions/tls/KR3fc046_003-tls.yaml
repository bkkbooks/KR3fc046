body:
  text: 接讀手敎如親謦欬前于黃宗易處已領得大製宮室圖兹復見惠巳分一部致李生尙之并將尊札付其閱看伊亦深佩服以不得握手爲恨所論月五星諸論推闡入微以實測之數假立法𧰼以求其合尤爲洞澈根原北衰病不能進于此道當賴英絕領袖之耳舍弟在幕想時親高論兹託將生于野附致寸函並候起居不戬弟大昕頓首本月十二日謁見竹汀師接到寄惠大作羣經宮室圖一部拜領之下感謝無巳讀足下與竹汀師書知足下于推步之學甚精議論俱極允當不可移易葢月體之于次輪旣行倍離之度則其體勢自與七政之在本輪不同而月體旣周行次輪則轉繞一周自不能成大圈與本天等火星歲輪徑旣有犬小則其軌迹自不能等于本天反復數四覺前人所説苐舉其大分而足下更能推極其精密曷勝承敎佩服之至足下又云有其當然亦必有其所以然銳愚以爲其所以然不外乎所當然也何者古法自三統以來見存者約四十家其于日月之盈縮遲疾五星之順留伏逆皆言其當然而不言其所以然本朝時憲書甲子元用諸輪法癸卯元用撱圓法以及
