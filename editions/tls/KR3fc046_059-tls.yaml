body:
  text: 按前圖次均輪心在戊故丙戊邊卽次輪全徑而丙角卽已外角此圖次均輪心在庚爲丙庚甲三角形於戊丙甲之丙角更多一庚丙戊之丙角故旣併甲乙兩角爲戊丙甲之丙角又以次均輪心所行之餘弧丙庚心右旋歴丙戊至庚爲弧背與半周減得庚戊又折半之爲庚丙戌之丙角合戊丙甲之丙角爲庚丙甲之丙角於是有丙角有初均求得之丙甲邊有次均輪行度餘弧丙庚弧背之通弦爲兩邊一角以求角而甲角得矣自丙右旋歴戊至庚自庚左旋至丙其通弦共丙庚直線是以過半周用餘弧之通弦與正弦之義同也按午子丁丑爲新次輪未戊酉卯爲舊次輪兩相貫而間一午卯半徑午爲舊輪之心卽爲新輪之近點
