body:
  text: 均凡行度過半周則用其度之餘按乙丑為甲角復以甲角丙角丙甲邊或丙子弧求得子甲角為次均之一邊以次輪半徑子辰為一邊行度辰未餘弧即子角有子角有子辰邊有子甲邊可求甲角丑亥於平行加乙丑外又加丑亥為次均數也自未至酉為半周歷酉至辰則過半周行度為未酉辰餘弧為辰未故用辰未也又按酉子丑未為一線丑以前為初均得數次均自丑起即自酉起次輪視本天為遠近於此益明月之次均知兩邊而行度不可以為用以初均所知之二角併之以為角兩角之線相交其外角即兩角併之
