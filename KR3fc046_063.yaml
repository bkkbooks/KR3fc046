body:
  text: 按次輪心在均輪最高癸丙與丁卯一線無平行之徑然合甲乙兩角亦得外角午丁但次均輪行次輪之度為自丙至戊則次均三角形乃甲丙戊有丙甲初均求得之邊有次均輪行度之通弦戊丙而午丁之丙角不可用故以癸戊界角之度四十五折半為己丁舊次輪之角度二十二度三十分減外角午己丁之度得午己即甲戊丙之丙角有兩邊一角而甲度可求矣前圖界角用加此圖用減者次均輪心行過次輪半周度溢於次輪心故加外角乃得丙角不及次輪半周度朒於次輪心故減外角乃得丙角圖互明之也按丙角之丁午不可知因倍甲乙丙句股形為甲乙丙子縱方形界以丙午壬甲斜弦則甲丙子之丙角即乙甲丙之甲角復規此丙角為卯午未丁之半周
