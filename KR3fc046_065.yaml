body:
  text: 亦界以丙午壬甲斜弦則午丙丁之丙角即乙甲酉之甲角蓋辰甲酉之甲角即乙甲亥之甲角亥甲酉之甲角即乙丙子甲縱方之甲角亦即乙丙子甲縱方之乙角規而小之則癸壬辛庚與午未丁等故併乙甲兩角為丙角午丁也若不併兩角以為角則以初均對角之外角加減次輪之界角以為角以初均之角度本天之半徑更合均輪之半徑於負輪之半徑求之乃得對角有對角斯得對角之外角蓋均輪心左旋近於最高其行度未可為角而併之若以為角必減半周也
