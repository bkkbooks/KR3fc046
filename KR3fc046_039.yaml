body:
  text: 本輪心之行謂之平行均輪心之行謂之引數日之實體及次輪心之行謂之倍引數五星在次輪行太陽平行之度謂之距度次均輪心及月之實體倍行距日之度謂之倍離實體值平行之前謂之盈值平行之後謂之縮自所盈所縮至於平行爲地心角度推得其度謂之均數以均輪推之謂之初均以次輪推之謂之次均以次均輪推之謂之三均均數者消息乎平行者也日止用初均五星兼用次均月兼用三均當其盈以平行加均數當其縮以平行減均數初均盈於平行二三均盈於初均以加益其加初均縮於平行二三均縮於初均以減益其減初均盈於平行二三均縮於初均則先加而後減初均縮於平行二三均盈於初均則先減而後加
