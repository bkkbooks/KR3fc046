body:
  text: 數按初均求得丙甲邊為一邊即前圖子甲次均輪適當次輪最遠無通弦之度以次輪全徑為一邊其丙角己戌行度之所不及戌角丙辛亦非行度所合故行度為角之法不可以據而必合甲乙二角以為丙角也
