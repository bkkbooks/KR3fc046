body:
  text: 按圖乙丑爲均數亦卽甲角故求得甲角卽得乙丑均數也欲求甲角必先求乙丙丁句股形午卯爲均輪心行本輪之餘弧亦卽本輪心之乙角此有數者也以卯丁均輪半徑減卯乙本輪半徑爲丁乙亦有數者也有乙角有乙丁邊加以丙直角可求丙乙邊及丙丁邊有丙乙邊加乙甲本天半徑又有數者也均輪心自最近所行之度丁子其通弦加丙丁邊又有數者也有丙子邊有丙甲邊仍加以丙直角可求甲角卽乙丑也實體在子本輪心在乙子在乙前則用加子在乙後則用減
