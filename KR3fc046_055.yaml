body:
  text: 按甲乙己三角引乙至寅引甲至庚交於己引己作子己午縱線又引己作己丑橫線則乙子己如乙丑己丑己甲如己午甲乙子己之己角卽乙丑己之乙角丑己甲之甲角如己午甲之己角己午甲之己角卽庚辰已之己角乙子己之己角卽寅卯己之己角合寅卯己之己角於午甲己之己角猶夫合庚辰己之己角於乙子己之己角也兩己角相併卽甲乙兩角相併之度丙戌線與乙己辛線平行則丙角猶夫兩己角併矣又按乙角有二不同乙己甲之乙角爲均輪心所行與甲角併爲丙角者此乙角也乙丙甲之乙角以丙甲邊乙甲邊甲角求之可得得之亦可求丙乙弧然無所用之葢丙甲之得由於丙壬大句壬角直角非由丙乙甲之乙角本輪𠮓爲負輪均輪次輪之跡己移最易惑人故此圖去丙乙線次輪遠近線作壬丙線初均次輪通弦胃抵徑線之大句俾知丙甲之求在壬角不在乙角也又按丑丙甲相貫爲一線丑乙初均減平行之數次均爲甲角丑亥若次輪以本天爲遠近則最遠最近必當丑亥之間與丑乙不相屬故在本天必自丑起算而在次輪卽必自丙起算也葢初均次輪心本在
