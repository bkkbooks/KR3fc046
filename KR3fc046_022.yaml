body:
  text: 距日爲之率所以設負輪增次均輪行倍離皆所以就實測之度以爲之法不然同一距日在五星之次輪與日天同大在月則視均輪爲尤小何也且五星次輪軌迹可規成伏見輪之圜周而月行倍離其次均輪所載之體規其軌跡不可令圜亦與日無一定相距之向則諸輪皆巧法非實跡於此可見故初均之均輪在本輪次均之均輪在負輪法隨乎測則輪隨乎法也徵君又云日有二小輪月五星有三小輪皆以齊視行之不齊有不得不然者又云總是借虛率以求眞度然則所云常向最高精氣攝之者未可泥於其説矣五星之合望畱逆依於日行故次輪與日天同大次輪軌迹所成謂之伏見輪故伏見輪與本天同大金水之本天小於日天其次輪大於本天故不用次輪而用伏見輪伏見輪以日爲心其心不在本天故不用金水之本天而用日天所以就伏見輪之心也葢日天卽金水之次輪伏見輪卽金水之本天土木火在日外以本天載次輪金水在日內則反其用以次輪載本天土木火之伏見輪大於日天不用而用次輪其義一也
