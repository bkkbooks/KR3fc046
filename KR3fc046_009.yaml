body:
  text: 差設也按實體在最高與本輪心地心皆一線無所用其本輪惟測得盈縮差故用本輪以消息之使本輪心順行實體逆轉心當中距實體當盈縮差故有盈縮差乃有半徑有半徑乃有本輪有本輪乃有最高諸輪起於實測夫又何疑李尚之云本輪至本天中距則本輪半徑為最大均數之切線即兩心差若最大均數之正弦必小於本輪半徑則亦小於兩心差又由中距而上測之當最高之前後則半徑宜於長由中距而下測之當最卑之前後則半徑宜於促於是分本輪之徑以為均輪均輪者為高卑前後之差設也
  hash: sha256:246f71afb54277b4f749432fd6eda45db43f7e8374e974068714d1ba4bafc73e
